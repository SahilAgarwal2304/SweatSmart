<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <section id="auth-screen" class="auth-wrapper">
        <div class="auth-box">
            <h1>Fitness Tracker</h1>
            <p>Sign in to sync your routines.</p>
            <button id="google-login-btn" class="primary-btn w-full">Sign in with Google</button>
        </div>
    </section>

    <main class="app-content" style="display: none;">
        
        <section id="tab-dashboard" class="screen active">
            <header class="top-header">
                <h2>Dashboard</h2>
            </header>
            <div class="content-padding">
                <div class="stats-grid">
                    <div class="stat-box">
                        <span class="stat-label">Streak</span>
                        <span class="stat-value text-accent" id="streak-display">0 Days</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-routine" class="screen">
            <header class="top-header">
                <h2>Today's Routine</h2>
            </header>
            <div class="content-padding">
                <div class="routine-card">
                    <h3 style="margin-bottom: 5px;">Chest & Biceps</h3>
                    <p style="color: var(--text-muted); margin-bottom: 15px;" id="current-exercise">Incline Dumbbell Press</p>
                    
                    <div id="sets-container">
                        <div class="set-row">
                            <span style="width: 50px;">Set 1</span>
                            <input type="number" placeholder="Reps" class="rep-input form-input">
                            <input type="number" placeholder="Weight (kg)" class="weight-input form-input">
                        </div>
                    </div>

                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <button id="add-set-btn" class="secondary-btn w-full">+ Add Set</button>
                        <button id="save-workout-btn" class="primary-btn w-full">Save Set</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-custom" class="screen">
            <header class="top-header">
                <h2>Custom Workout</h2>
            </header>
            <div class="content-padding">
                <button class="primary-btn w-full">+ Add Custom Exercise</button>
            </div>
        </section>

        <section id="tab-edit" class="screen">
            <header class="top-header">
                <h2>Edit Planner</h2>
            </header>
            <div class="content-padding">
                <p style="color: var(--text-muted);">Routine editor coming soon...</p>
            </div>
        </section>

        <section id="tab-profile" class="screen">
            <header class="top-header">
                <h2>Profile</h2>
            </header>
            <div class="content-padding">
                <div class="profile-card" style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 15px;">Body Metrics</h3>
                    <div style="margin-bottom: 10px;">
                        <label class="stat-label">Weight (kg)</label>
                        <input type="number" id="weight-input" class="form-input w-full" placeholder="e.g. 75">
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label class="stat-label">Body Fat %</label>
                        <input type="number" id="fat-input" class="form-input w-full" placeholder="e.g. 15">
                    </div>
                    <button id="save-metrics-btn" class="primary-btn w-full">Update Metrics</button>
                </div>
                <button id="logout-btn" class="danger-btn w-full">Logout</button>
            </div>
        </section>

    </main>

    <nav class="bottom-nav" style="display: none;">
        <button class="nav-item active" data-target="tab-dashboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            <span>Dash</span>
        </button>
        <button class="nav-item" data-target="tab-routine">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
            <span>Routine</span>
        </button>
        <button class="nav-item" data-target="tab-custom">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            <span>Custom</span>
        </button>
        <button class="nav-item" data-target="tab-edit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            <span>Edit</span>
        </button>
        <button class="nav-item" data-target="tab-profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            <span>Profile</span>
        </button>
    </nav>

    <script type="module" src="app.js"></script>
</body>
</html>
